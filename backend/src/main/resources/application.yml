server:
  port: 8081

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/smart_campus_db
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - email
              - profile
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
  
  # File Upload Configuration (NEW - for Module C)
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB        # Maximum size per file
      max-request-size: 30MB     # Maximum total request size (3 files × 10MB)
      file-size-threshold: 2KB   # Files larger than this are written to disk
  
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_APP_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

app:
  jwt:
    secret: smartcampus_super_secret_key_2026_must_be_long_enough
    expiration: 86400000 # 1 day in ms
  frontend-redirect: http://localhost:3000/oauth-success
  frontend-base-url: http://localhost:3000
  mail:
    from: ${MAIL_USERNAME}

# File Storage Configuration (NEW - for Module C)
file:
  upload-dir: uploads/tickets  # Directory where ticket attachments are stored